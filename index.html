<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校園外送｜菜單</title>
    <link rel="stylesheet" href="../css/base.css" />

    <style>
      .menu-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 24px;
      }

      .meal-card {
        display: flex;
        flex-direction: column;
        padding: 20px;
        background-color: #ffffff;
        border: 1px solid #dddddd;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgb(0 0 0 / 8%);
      }

      .meal-card h2 {
        margin-top: 0;
        margin-bottom: 10px;
      }

      .meal-description {
        flex-grow: 1;
        color: #666666;
        line-height: 1.6;
      }

      .meal-price {
        margin: 16px 0;
        font-size: 20px;
        font-weight: bold;
      }

      .add-to-cart-button {
        padding: 10px 16px;
        color: #ffffff;
        font-size: 16px;
        cursor: pointer;
        background-color: #e67e22;
        border: none;
        border-radius: 8px;
      }

      .add-to-cart-button:hover {
        background-color: #ca6f1e;
      }

      .status-message {
        min-height: 24px;
        margin: 16px 0;
        color: #1e8449;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <header class="site-header">
      <a class="brand" href="../index.html">校園外送</a>

      <nav aria-label="主要導覽">
        <a href="restaurants.html">餐廳</a>
        <a href="cart.html">
          購物車
          <span data-cart-count>0</span>
        </a>
        <a href="../index.html">首頁</a>
      </nav>
    </header>

    <main class="container">
      <section class="page-heading">
        <p class="eyebrow">本日菜單</p>
        <h1>晴天咖啡</h1>
        <p class="muted">挑選餐點後，按下按鈕加入購物車。</p>
      </section>

      <p
        class="status-message"
        data-status-message
        aria-live="polite"
      ></p>

      <!-- 成員 3：餐點卡片區域 -->
      <section aria-labelledby="meal-list-title">
        <h2 id="meal-list-title">餐點列表</h2>

        <div class="menu-list">
          <article class="meal-card">
            <h2>經典火腿蛋吐司</h2>

            <p class="meal-description">
              香煎火腿搭配新鮮雞蛋與生菜，適合當作美味早餐。
            </p>

            <p class="meal-price">NT$ 55</p>

            <button
              class="add-to-cart-button"
              type="button"
              data-add-to-cart
              data-name="經典火腿蛋吐司"
              data-price="55"
            >
              加入購物車
            </button>
          </article>

          <article class="meal-card">
            <h2>奶油培根義大利麵</h2>

            <p class="meal-description">
              濃郁奶油白醬搭配香煎培根與義大利麵，口感滑順。
            </p>

            <p class="meal-price">NT$ 120</p>

            <button
              class="add-to-cart-button"
              type="button"
              data-add-to-cart
              data-name="奶油培根義大利麵"
              data-price="120"
            >
              加入購物車
            </button>
          </article>

          <article class="meal-card">
            <h2>蜂蜜拿鐵</h2>

            <p class="meal-description">
              香醇濃縮咖啡加入鮮奶與蜂蜜，帶有自然甜味。
            </p>

            <p class="meal-price">NT$ 75</p>

            <button
              class="add-to-cart-button"
              type="button"
              data-add-to-cart
              data-name="蜂蜜拿鐵"
              data-price="75"
            >
              加入購物車
            </button>
          </article>
        </div>
      </section>
    </main>

    <footer>校園外送小組協作練習</footer>

    <script src="../js/app.js"></script>

    <script>
      const addToCartButtons =
        document.querySelectorAll("[data-add-to-cart]");

      const statusMessage =
        document.querySelector("[data-status-message]");

      const cartCount =
        document.querySelector("[data-cart-count]");

      let cartItemCount = Number(cartCount?.textContent) || 0;
      let messageTimer;

      addToCartButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const mealName = button.dataset.name;

          cartItemCount += 1;

          if (cartCount) {
            cartCount.textContent = cartItemCount;
          }

          statusMessage.textContent =
            `${mealName} 已加入購物車！`;

          clearTimeout(messageTimer);

          messageTimer = setTimeout(() => {
            statusMessage.textContent = "";
          }, 2000);
        });
      });
    </script>
  </body>
</html>
```
