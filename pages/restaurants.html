<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="../css/base.css" />

  <body>
    <header class="site-header">
      <a class="brand" href="../index.html">校園外送</a>
      <nav aria-label="主要導覽"><a href="../index.html">首頁</a><a href="menu.html">菜單</a><a href="cart.html">購物車 <span data-cart-count>0</span></a></nav>

    <main class="container">
      <section class="page-heading"><p class="eyebrow">選擇餐廳</p><h1>附近餐廳</h1><p class="muted">選一間餐廳，再查看它的菜單。</p></section>
      <section class="grid" aria-label="餐廳列表">
        <article class="card">
          <h2>晴天咖啡</h2>

        <article class="card">
          <h2>校園麵食館</h2>
          <p class="muted">類型：中式麵食</p>
          <p>營業時間：11:00–20:00</p>
          <a class="button" href="menu.html">查看菜單</a>
        </article>
        <article class="card">
          <h2>青葉健康餐</h2>
          <p class="muted">類型：健康便當</p>
          <p>營業時間：10:30–19:30</p>
          <a class="button" href="menu.html">查看菜單</a>

    <footer>校園外送小組協作練習</footer><script src="../js/app.js"></script>
