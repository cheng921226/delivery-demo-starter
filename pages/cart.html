<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校園外送｜購物車</title>
    <link rel="stylesheet" href="../css/base.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html">校園外送</a>
      <nav aria-label="主要導覽"><a href="menu.html">菜單</a><a href="order-status.html">訂單狀態</a><a href="../index.html">首頁</a></nav>
    </header>
    <main class="container">
      <section class="page-heading"><p class="eyebrow">訂單確認</p><h1>購物車</h1><p class="muted">這是前台原型，不會真的送出訂單。</p></section>
      <section class="panel" aria-labelledby="cart-summary-title">
        <h2 id="cart-summary-title">購物車摘要</h2>
        <p class="muted">晴天咖啡・共 2 項餐點</p>

        <div class="grid">
          <article class="card">
            <h3>經典雞肉三明治</h3>
            <p class="muted">香煎雞肉、生菜、番茄與特製醬料</p>
            <p>數量：1</p>
            <strong>NT$ 85</strong>
          </article>

          <article class="card">
            <h3>冰拿鐵</h3>
            <p class="muted">濃縮咖啡搭配鮮奶</p>
            <p>數量：1</p>
            <strong>NT$ 65</strong>
          </article>
        </div>

        <div class="card" aria-label="訂單金額">
          <p>餐點小計：<strong>NT$ 150</strong></p>
          <p>外送運費：<strong>NT$ 30</strong></p>
          <hr />
          <h3>訂單總額：NT$ 180</h3>
        </div>

        <p class="status-message" data-order-message aria-live="polite"></p>
        <button type="button" data-place-order>模擬下單</button>
        <p class="muted">按下按鈕僅供流程展示，不會進行付款。</p>
      </section>
    </main>
    <footer>校園外送小組協作練習</footer>
    <script src="../js/app.js"></script>
    <script>
      const placeOrderButton = document.querySelector("[data-place-order]");
      const orderMessage = document.querySelector("[data-order-message]");

      placeOrderButton.addEventListener("click", () => {
        orderMessage.textContent = "模擬下單成功！可前往訂單狀態頁查看進度。";
      });
    </script>
  </body>
</html>
